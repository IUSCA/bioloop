# =============================================================================
# nginx configuration for JupyterHub
#
# Topology:
#   internet → nginx (TLS termination, :443) → JupyterHub (:8000, 127.0.0.1)
#
# Place at: /etc/nginx/sites-available/jupyterhub
# Enable:   ln -s /etc/nginx/sites-available/jupyterhub \
#                 /etc/nginx/sites-enabled/jupyterhub
# =============================================================================

# cSpell:disable

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name notebooks.research-portal.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;   # for Let's Encrypt / certbot renewals
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notebooks.research-portal.com;

    # -------------------------------------------------------------------------
    # TLS
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/notebooks.research-portal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notebooks.research-portal.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # CSP: allow iframes only from your portal (for embedding notebooks if needed)
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "connect-src 'self' wss://notebooks.research-portal.com; "
        "frame-ancestors 'self' https://research-portal.com;"
        always;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/jupyterhub.access.log combined;
    error_log  /var/log/nginx/jupyterhub.error.log warn;

    # -------------------------------------------------------------------------
    # Client settings
    # -------------------------------------------------------------------------
    client_max_body_size 100M;   # allow large notebook uploads

    # -------------------------------------------------------------------------
    # WebSocket support — required for Jupyter kernels
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ''        close;
    }

    # -------------------------------------------------------------------------
    # Proxy to JupyterHub
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:8000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (kernel connections, terminals if re-enabled)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Timeouts
        # Long timeouts are necessary: notebook kernels hold open connections.
        proxy_read_timeout    86400s;   # 24h — keeps long-running kernels alive
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;

        # Buffering
        # Disable response buffering so kernel output streams in real time.
        proxy_buffering          off;
        proxy_request_buffering  off;
    }

    # -------------------------------------------------------------------------
    # Hub API — restrict to internal callers only
    # -------------------------------------------------------------------------
    location /hub/api/ {
        # Only your portal backend and internal services should call the Hub API.
        # Adjust to match your portal server's IP or subnet.
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # -------------------------------------------------------------------------
    # Static assets — cache aggressively
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;

        expires     7d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }
}
