# /etc/pip.conf  — baked into the container image
#
# Points pip at an unreachable index.
# Any `pip install` attempt will immediately fail with a connection error
# rather than hanging. This applies system-wide (all users, all venvs).

[global]
index-url = http://0.0.0.0
no-cache-dir = true
disable-pip-version-check = true

[install]
# Prevents wheel builds that could smuggle in arbitrary code execution
no-build-isolation = true
